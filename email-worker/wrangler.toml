name = "kith-email-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Both secrets are set via wrangler secret put — nothing sensitive lives here:
#   npx wrangler secret put KITH_URL
#   (your Kith server's public URL, e.g. https://kith.yourdomain.com)
#
#   npx wrangler secret put KITH_WEBHOOK_SECRET
#   (shown in Kith → Settings → Email Forwarding → Webhook secret)
